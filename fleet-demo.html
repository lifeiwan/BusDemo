<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FleetDemo — Fleet Management</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f1f5f9;
    --sidebar:   #1a1f2e;
    --accent:    #3b82f6;
    --card:      #ffffff;
    --border:    #e2e8f0;
    --text:      #1e293b;
    --muted:     #64748b;
    --success:   #22c55e;
    --warning:   #f59e0b;
    --danger:    #ef4444;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  #app { display: grid; grid-template-columns: 230px 1fr; height: 100vh; }

  /* ── Sidebar ── */
  #sidebar { background: var(--sidebar); color: #e2e8f0; display: flex;
             flex-direction: column; overflow-y: auto; }
  .brand { padding: 1.5rem 1.25rem 1rem; font-size: 1.25rem; font-weight: 700;
           color: #fff; letter-spacing: -0.02em; border-bottom: 1px solid #2d3548; }
  .brand span { color: var(--accent); }
  #sidebar nav ul { list-style: none; padding: 0.75rem 0; }
  #sidebar nav ul li { display: flex; align-items: center; gap: 0.6rem;
                        padding: 0.7rem 1.25rem; cursor: pointer; font-size: 0.9rem;
                        color: #94a3b8; transition: all .15s; }
  #sidebar nav ul li:hover { background: #2d3548; color: #e2e8f0; }
  #sidebar nav ul li.active { background: var(--accent); color: #fff; font-weight: 600; }
  #sidebar nav ul li svg { flex-shrink: 0; }
  .sidebar-section { padding: 0.5rem 1.25rem 0.25rem;
                     font-size: 0.7rem; letter-spacing: .1em; text-transform: uppercase;
                     color: #4a5568; margin-top: 0.5rem; }

  /* ── Content ── */
  #content { overflow-y: auto; background: var(--bg); }
  #content section { display: none; padding: 2rem; }

  /* ── Page header ── */
  .page-header { display: flex; align-items: center; justify-content: space-between;
                 margin-bottom: 1.5rem; }
  .page-header h1 { font-size: 1.5rem; font-weight: 700; }
  .page-header p  { font-size: 0.875rem; color: var(--muted); margin-top: 0.2rem; }

  /* ── Cards ── */
  .card { background: var(--card); border-radius: 10px; border: 1px solid var(--border);
          padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.05); }

  /* ── Stat row ── */
  .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border);
               padding: 1.25rem 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .stat-card .val  { font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-card .lbl  { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; }
  .stat-card .icon { font-size: 1.5rem; margin-bottom: 0.5rem; }

  /* ── Two-col grid ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  /* ── Health bar ── */
  .health-bar { display: flex; height: 10px; border-radius: 99px; overflow: hidden;
                margin: 0.75rem 0; }
  .health-bar .seg { transition: width .4s; }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th { background: #f8fafc; text-align: left; padding: 0.65rem 1rem;
       font-size: 0.72rem; text-transform: uppercase; letter-spacing: .05em;
       color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f8fafc; }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem;
           border-radius: 99px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
  .badge-active         { background: #dcfce7; color: #166534; }
  .badge-maintenance    { background: #fef9c3; color: #854d0e; }
  .badge-out_of_service { background: #fee2e2; color: #991b1b; }
  .badge-pass           { background: #dcfce7; color: #166534; }
  .badge-fail           { background: #fee2e2; color: #991b1b; }
  .badge-route          { background: #ede9fe; color: #5b21b6; }
  .badge-one_time       { background: #cffafe; color: #155e75; }
  .badge-completed      { background: #dcfce7; color: #166534; }
  .badge-scheduled      { background: #fef9c3; color: #854d0e; }
  .badge-monthly        { background: #e0f2fe; color: #0369a1; }
  .badge-yearly         { background: #faf5ff; color: #7e22ce; }
  .badge-inactive       { background: #f1f5f9; color: #475569; }
  .badge-salary         { background: #dbeafe; color: #1e40af; }
  .badge-bonus          { background: #ede9fe; color: #5b21b6; }
  .badge-reimbursement  { background: #fef3c7; color: #92400e; }
  .badge-other          { background: #f1f5f9; color: #475569; }

  /* ── Profit coloring ── */
  .profit-pos { color: #16a34a; font-weight: 600; }
  .profit-neg { color: #dc2626; font-weight: 600; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem;
         border-radius: 7px; border: none; font-size: 0.875rem; font-weight: 500;
         cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger  { background: #fee2e2; color: #991b1b; }
  .btn-danger:hover { background: #fecaca; }
  .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.78rem; }
  .btn-info { background: #eff6ff; color: #1d4ed8; }
  .btn-info:hover { background: #dbeafe; }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select {
    padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 7px;
    font-size: 0.875rem; background: #fff; color: var(--text); outline: none; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
  .filter-bar input { flex: 1; min-width: 180px; }

  /* ── Summary chips ── */
  .chip-row { display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
          padding: 0.6rem 1rem; font-size: 0.85rem; }
  .chip .c-val { font-size: 1.2rem; font-weight: 700; }
  .chip .c-lbl { color: var(--muted); font-size: 0.78rem; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45);
                   display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal-box { background: #fff; border-radius: 12px; padding: 1.75rem;
               width: 500px; max-height: 90vh; overflow-y: auto;
               box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal-box h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.25rem; }

  /* ── Form ── */
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600;
                      color: var(--muted); margin-bottom: 0.3rem; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border);
    border-radius: 7px; font-size: 0.875rem; color: var(--text);
    background: #fff; outline: none; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  /* ── Checklist ── */
  .checklist-item { display: flex; align-items: center; justify-content: space-between;
                    padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item .item-name { font-size: 0.875rem; font-weight: 500; }
  .radio-group { display: flex; gap: 0.75rem; }
  .radio-group label { display: flex; align-items: center; gap: 0.3rem;
                       font-size: 0.85rem; cursor: pointer; }
  .radio-group input[type=radio] { accent-color: var(--accent); }

  /* ── Vehicle / Driver detail modals ── */
  .detail-section { margin-top: 1rem; }
  .detail-section h3 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
                       letter-spacing: .05em; color: var(--muted); margin-bottom: 0.5rem; }
  .detail-item { display: flex; justify-content: space-between; padding: 0.4rem 0;
                 border-bottom: 1px solid var(--border); font-size: 0.875rem; }
  .detail-item:last-child { border-bottom: none; }

  /* ── Cost breakdown table in detail modal ── */
  .cost-row { display: flex; justify-content: space-between; padding: 0.35rem 0;
              border-bottom: 1px solid var(--border); font-size: 0.875rem; }
  .cost-row:last-child { border-bottom: none; }
  .cost-row.total { font-weight: 700; border-top: 2px solid var(--border); margin-top: 0.25rem; padding-top: 0.5rem; }
  .cost-row.profit-line { font-weight: 700; font-size: 1rem; }

  /* ── Driver card ── */
  .driver-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .driver-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
                 padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .driver-card .d-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
  .driver-card .d-info { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }

  /* ── Misc ── */
  .empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.875rem; }
  .text-right { text-align: right; }
  .text-muted { color: var(--muted); }
  .mt-1 { margin-top: 1rem; }
  .card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; }
  .card-subtitle { font-size: 0.75rem; font-weight: 400; color: var(--muted); margin-left: 0.5rem; }
  .expiry-warn { color: #d97706; font-weight: 600; }
  .section-gap { margin-top: 1.5rem; }
</style>

// ── Profit helpers ──

function jobRevenueLM(job) {
  if (job.type === "one_time")
    return (job.date >= LM_START && job.date <= LM_END) ? job.revenue : 0;
  if (job.startDate > LM_END) return 0;
  if (job.recurrence === "daily")   return job.revenue * LM_DAYS;
  if (job.recurrence === "weekly")  return job.revenue * 4;
  if (job.recurrence === "monthly") return job.revenue;
  return 0;
}

function insuranceMonthlyCost(policy) {
  return policy.type === "monthly" ? policy.cost : +(policy.cost / 12).toFixed(2);
}

function vehicleProfitLM(vehicleId) {
  const rev        = jobs.reduce((s,j) => s + (j.vehicleId === vehicleId ? jobRevenueLM(j) : 0), 0);
  const maintCost  = maintenanceEntries.filter(e => e.vehicleId === vehicleId && e.date >= LM_START && e.date <= LM_END).reduce((s,e) => s+e.cost, 0);
  const fuelCost   = fuelEntries.filter(e => e.vehicleId === vehicleId && e.date >= LM_START && e.date <= LM_END).reduce((s,e) => s+e.total, 0);
  const insCost    = insurancePolicies.filter(p => p.vehicleId === vehicleId).reduce((s,p) => s+insuranceMonthlyCost(p), 0);
  const mPark      = parkingEntries.filter(p => p.vehicleId === vehicleId && p.type === "monthly").reduce((s,p) => s+p.cost, 0);
  const otPark     = parkingEntries.filter(p => p.vehicleId === vehicleId && p.type === "one_time" && p.date >= LM_START && p.date <= LM_END).reduce((s,p) => s+p.cost, 0);
  const parkCost   = mPark + otPark;
  const driverCost = driverCosts.filter(c => c.vehicleId === vehicleId && c.date >= LM_START && c.date <= LM_END).reduce((s,c) => s+c.amount, 0);
  const costs      = maintCost + fuelCost + insCost + parkCost + driverCost;
  return { rev, costs, profit: rev-costs, maintCost, fuelCost, insCost, parkCost, driverCost };
}

function jobProfitLM(job) {
  const rev = jobRevenueLM(job);
  if (rev === 0) return { rev:0, costs:0, profit:0 };
  const vp = vehicleProfitLM(job.vehicleId);
  const share = vp.rev > 0 ? (rev / vp.rev) * vp.costs : 0;
  return { rev, costs: share, profit: rev - share };
}

function openModal(html, onSubmit) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal-box">${html}</div>`;
  document.body.appendChild(overlay);
  const close = () => document.body.removeChild(overlay);
  const form = overlay.querySelector("form");
  if (form) form.addEventListener("submit", e => { e.preventDefault(); onSubmit(new FormData(form)); close(); });
  overlay.querySelector(".modal-cancel")?.addEventListener("click", close);
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
}

function openInfoModal(html) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `<div class="modal-box">${html}</div>`;
  document.body.appendChild(overlay);
  overlay.querySelector(".modal-cancel")?.addEventListener("click", () => document.body.removeChild(overlay));
  overlay.addEventListener("click", e => { if (e.target === overlay) document.body.removeChild(overlay); });
}

function deleteInsurance(id) {
  if (!confirm("Delete this policy?")) return;
  const idx = insurancePolicies.findIndex(p => p.id === id);
  if (idx !== -1) insurancePolicies.splice(idx, 1);
  renderVehicles();
}

function deleteParking(id) {
  if (!confirm("Delete this parking entry?")) return;
  const idx = parkingEntries.findIndex(p => p.id === id);
  if (idx !== -1) parkingEntries.splice(idx, 1);
  // re-render the correct tab based on which one is visible
  const jobsVisible = document.getElementById("tab-jobs").style.display === "block";
  jobsVisible ? renderJobs() : renderVehicles();
}

function showVehicleDetail(id) {
  const v    = vehicles.find(x => x.id === id);
  const mnt  = maintenanceEntries.filter(e => e.vehicleId === id).sort((a,b) => b.date.localeCompare(a.date));
  const fu   = fuelEntries.filter(e => e.vehicleId === id).sort((a,b) => b.date.localeCompare(a.date));
  const insp = inspections.filter(e => e.vehicleId === id).sort((a,b) => b.date.localeCompare(a.date));
  const vp   = vehicleProfitLM(id);
  const pCls = vp.profit >= 0 ? "profit-pos" : "profit-neg";

  openInfoModal(`
    <h2>${v.year} ${v.make} ${v.model}</h2>
    <div style="display:flex;gap:0.75rem;margin-bottom:1.25rem">
      ${badge(v.status)}
      <span class="text-muted" style="font-size:0.85rem">${fmtN(v.mileage)} mi &nbsp;|&nbsp; ${v.color} &nbsp;|&nbsp; VIN: ${v.vin}</span>
    </div>
    <div class="detail-section" style="margin-top:0">
      <h3>March 2026 Profitability</h3>
      <div class="cost-row"><span>Revenue</span><span>${fmt$(vp.rev)}</span></div>
      <div class="cost-row"><span class="text-muted" style="padding-left:0.75rem">↳ Maintenance</span><span class="text-muted">${fmt$(vp.maintCost)}</span></div>
      <div class="cost-row"><span class="text-muted" style="padding-left:0.75rem">↳ Fuel</span><span class="text-muted">${fmt$(vp.fuelCost)}</span></div>
      <div class="cost-row"><span class="text-muted" style="padding-left:0.75rem">↳ Insurance</span><span class="text-muted">${fmt$(vp.insCost)}</span></div>
      <div class="cost-row"><span class="text-muted" style="padding-left:0.75rem">↳ Parking</span><span class="text-muted">${fmt$(vp.parkCost)}</span></div>
      <div class="cost-row"><span class="text-muted" style="padding-left:0.75rem">↳ Drivers</span><span class="text-muted">${fmt$(vp.driverCost)}</span></div>
      <div class="cost-row total"><span>Total Costs</span><span>${fmt$(vp.costs)}</span></div>
      <div class="cost-row profit-line ${pCls}"><span>Net Profit</span><span>${fmt$(vp.profit)}</span></div>
    </div>
    <div class="detail-section">
      <h3>Maintenance (${mnt.length} entries)</h3>
      ${mnt.length === 0 ? `<p class="text-muted" style="font-size:0.85rem">No records.</p>` :
        mnt.map(e => `<div class="detail-item"><span>${e.date} — ${e.type}</span><span>${fmt$(e.cost)}</span></div>`).join("")}
    </div>
    <div class="detail-section mt-1">
      <h3>Fuel Log (${fu.length} fill-ups)</h3>
      ${fu.length === 0 ? `<p class="text-muted" style="font-size:0.85rem">No records.</p>` :
        fu.map(e => `<div class="detail-item"><span>${e.date} — ${e.gallons.toFixed(1)} gal</span><span>${fmt$(e.total)}</span></div>`).join("")}
    </div>
    <div class="detail-section mt-1">
      <h3>Inspections (${insp.length} total)</h3>
      ${insp.length === 0 ? `<p class="text-muted" style="font-size:0.85rem">No records.</p>` :
        insp.map(e => `<div class="detail-item"><span>${e.date} — ${e.driver}</span>${badge(e.pass?"pass":"fail")}</div>`).join("")}
    </div>
    <div class="modal-footer"><button class="btn btn-ghost modal-cancel">Close</button></div>
  `);
}

let jSearch = "", jTypeFilter = "";

function renderJobs() {
  const list = jobs.filter(j => {
    const matchText = !jSearch || j.name.toLowerCase().includes(jSearch.toLowerCase()) || vName(j.vehicleId).toLowerCase().includes(jSearch.toLowerCase());
    const matchType = !jTypeFilter || j.type === jTypeFilter;
    return matchText && matchType;
  });

  const totalOTPark = parkingEntries.filter(p => p.type === "one_time").reduce((s,p) => s+p.cost, 0);

  document.getElementById("tab-jobs").innerHTML = `
    <div class="page-header">
      <div><h1>Jobs</h1><p>${jobs.length} jobs — ${jobs.filter(j=>j.type==="route").length} routes, ${jobs.filter(j=>j.type==="one_time").length} one-time</p></div>
      <button class="btn btn-primary" id="add-job-btn">+ Add Job</button>
    </div>
    <div class="filter-bar">
      <input id="j-search" placeholder="Search job name or vehicle…" value="${jSearch}" />
      <select id="j-type">
        <option value="">All Types</option>
        <option value="route"${jTypeFilter==="route"?" selected":""}>Route</option>
        <option value="one_time"${jTypeFilter==="one_time"?" selected":""}>One-time</option>
      </select>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Type</th><th>Vehicle</th><th>Driver</th><th>Revenue</th><th>Parking</th><th>Schedule</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${list.length === 0 ? `<tr><td colspan="9" class="empty">No jobs match your filters.</td></tr>` :
              list.map(j => {
                const schedule = j.type === "route"
                  ? `${j.recurrence.charAt(0).toUpperCase()+j.recurrence.slice(1)} · ${j.startTime}–${j.endTime}`
                  : `${j.date} · ${j.startTime}–${j.endTime}`;
                const revLabel = j.type === "route"
                  ? `${fmt$(j.revenue)}<span class="text-muted" style="font-size:0.75rem"> /${j.recurrence.replace("ly","")}</span>`
                  : fmt$(j.revenue);
                const parking = parkingEntries.filter(p => p.jobId === j.id).reduce((s,p) => s+p.cost, 0);
                const parkLabel = parking > 0
                  ? `<span style="color:var(--danger)">${fmt$(parking)}</span>`
                  : `<span class="text-muted">—</span>`;
                return `<tr>
                  <td><strong>${j.name}</strong></td>
                  <td>${badge(j.type)}</td>
                  <td>${vName(j.vehicleId)}</td>
                  <td>${j.driverId ? dName(j.driverId) : '<span class="text-muted">—</span>'}</td>
                  <td>${revLabel}</td>
                  <td>${parkLabel}</td>
                  <td class="text-muted" style="font-size:0.82rem">${schedule}</td>
                  <td>${badge(j.status)}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteJob(${j.id})">Delete</button></td>
                </tr>`;
              }).join("")}
          </tbody>
        </table>
      </div>
    </div>

    <!-- One-time Parking -->
    <div class="card section-gap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div>
          <span class="card-title" style="margin-bottom:0">One-time Job Parking</span>
          <span class="card-subtitle">Total logged: ${fmt$(totalOTPark)}</span>
        </div>
        <button class="btn btn-primary btn-sm" id="add-otpark-btn">+ Add Parking</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Job</th><th>Vehicle</th><th>Location</th><th>Cost</th><th>Notes</th><th></th></tr></thead>
          <tbody>
            ${parkingEntries.filter(p => p.type === "one_time").length === 0
              ? `<tr><td colspan="7" class="empty">No one-time parking entries yet.</td></tr>`
              : parkingEntries.filter(p => p.type === "one_time").sort((a,b) => b.date.localeCompare(a.date)).map(p => `<tr>
                  <td class="text-muted">${p.date}</td>
                  <td>${p.jobId ? jName(p.jobId) : '<span class="text-muted">—</span>'}</td>
                  <td>${vName(p.vehicleId)}</td>
                  <td>${p.location}</td>
                  <td><strong>${fmt$(p.cost)}</strong></td>
                  <td class="text-muted">${p.notes||"—"}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteParking(${p.id})">Delete</button></td>
                </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById("j-search").addEventListener("input", e => { jSearch = e.target.value; renderJobs(); });
  document.getElementById("j-type").addEventListener("change", e => { jTypeFilter = e.target.value; renderJobs(); });

  document.getElementById("add-job-btn").addEventListener("click", () => {
    const today = new Date().toISOString().slice(0,10);
    openModal(`
      <h2>Add Job</h2>
      <form>
        <div class="form-group">
          <label>Job Name</label>
          <input type="text" name="name" placeholder="e.g. Airport Shuttle Route A" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Vehicle</label>
            <select name="vehicleId">${vehicleOptions()}</select>
          </div>
          <div class="form-group">
            <label>Driver</label>
            <select name="driverId">${driverOptions()}</select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Revenue ($)</label>
            <input type="number" name="revenue" step="0.01" placeholder="e.g. 350.00" required />
          </div>
          <div class="form-group">
            <label>Type</label>
            <div class="radio-group" style="margin-top:0.5rem">
              <label><input type="radio" name="type" value="route" id="type-route" checked /> Route</label>
              <label><input type="radio" name="type" value="one_time" id="type-onetime" /> One-time</label>
            </div>
          </div>
        </div>
        <div id="route-fields">
          <div class="form-row">
            <div class="form-group">
              <label>Recurrence</label>
              <select name="recurrence"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select>
            </div>
            <div class="form-group">
              <label>Route Start Date</label>
              <input type="date" name="startDate" value="${today}" />
            </div>
          </div>
        </div>
        <div id="onetime-fields" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label>Date</label>
              <input type="date" name="date" value="${today}" />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select name="otStatus"><option value="scheduled">Scheduled</option><option value="completed">Completed</option></select>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Start Time</label><input type="time" name="startTime" value="08:00" required /></div>
          <div class="form-group"><label>End Time</label><input type="time" name="endTime" value="17:00" required /></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Job</button>
        </div>
      </form>
    `, fd => {
      const type = fd.get("type");
      const dId  = fd.get("driverId") ? Number(fd.get("driverId")) : null;
      jobs.push({
        id: nextId(jobs), name: fd.get("name"), type,
        vehicleId: Number(fd.get("vehicleId")), driverId: dId,
        revenue: Number(fd.get("revenue")),
        startTime: fd.get("startTime"), endTime: fd.get("endTime"),
        ...(type === "route"
          ? { recurrence: fd.get("recurrence"), startDate: fd.get("startDate"), status:"active" }
          : { date: fd.get("date"), status: fd.get("otStatus") }),
      });
      renderJobs();
    });

    setTimeout(() => {
      const rf = document.getElementById("route-fields"), ot = document.getElementById("onetime-fields");
      document.getElementById("type-route").addEventListener("change", () => { rf.style.display=""; ot.style.display="none"; });
      document.getElementById("type-onetime").addEventListener("change", () => { rf.style.display="none"; ot.style.display=""; });
    }, 0);
  });

  // Add one-time parking
  document.getElementById("add-otpark-btn").addEventListener("click", () => {
    const today = new Date().toISOString().slice(0,10);
    openModal(`
      <h2>Add Job Parking</h2>
      <form>
        <div class="form-row">
          <div class="form-group"><label>Linked Job (optional)</label><select name="jobId">${jobOptions()}</select></div>
          <div class="form-group"><label>Vehicle</label><select name="vehicleId">${vehicleOptions()}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" name="date" value="${today}" required /></div>
          <div class="form-group"><label>Cost ($)</label><input type="number" name="cost" step="0.01" required /></div>
        </div>
        <div class="form-group"><label>Location</label><input type="text" name="location" placeholder="e.g. Convention Center Lot" required /></div>
        <div class="form-group"><label>Notes</label><input type="text" name="notes" placeholder="Optional" /></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    `, fd => {
      const jobId = fd.get("jobId") ? Number(fd.get("jobId")) : null;
      parkingEntries.push({ id: nextId(parkingEntries),
        vehicleId: Number(fd.get("vehicleId")), type: "one_time",
        cost: Number(fd.get("cost")), location: fd.get("location"),
        startDate: null, date: fd.get("date"), jobId,
        notes: fd.get("notes")||"" });
      renderJobs();
    });
  });
}

function deleteJob(id) {
  if (!confirm("Delete this job?")) return;
  const idx = jobs.findIndex(j => j.id === id);
  if (idx !== -1) jobs.splice(idx, 1);
  renderJobs();
}

      <form>
        <div class="form-group"><label>Vehicle</label><select name="vehicleId">${vehicleOptions()}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" name="date" value="${today}" required /></div>
          <div class="form-group"><label>Service Type</label><select name="type">${SERVICE_TYPES.map(t=>`<option>${t}</option>`).join("")}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Mileage</label><input type="number" name="mileage" placeholder="e.g. 35000" required /></div>
          <div class="form-group"><label>Cost ($)</label><input type="number" name="cost" step="0.01" placeholder="e.g. 89.99" required /></div>
        </div>
        <div class="form-group"><label>Technician</label><input type="text" name="tech" placeholder="Name" /></div>
        <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Optional notes…"></textarea></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Entry</button>
        </div>
      </form>
    `, fd => {
      maintenanceEntries.push({
        id: nextId(maintenanceEntries), vehicleId: Number(fd.get("vehicleId")),
        date: fd.get("date"), type: fd.get("type"),
        mileage: Number(fd.get("mileage")), cost: Number(fd.get("cost")),
        tech: fd.get("tech")||"—", notes: fd.get("notes")||"",
      });
      renderMaintenance();
    });
  });
}

function deleteMaint(id) {
  if (!confirm("Delete this entry?")) return;
  const idx = maintenanceEntries.findIndex(e => e.id === id);
  if (idx !== -1) maintenanceEntries.splice(idx, 1);
  renderMaintenance();
}

// ═══════════════════════════════════════════
//  TAB: FUEL LOG
// ═══════════════════════════════════════════

function renderFuel() {
  const sorted = [...fuelEntries].sort((a,b) => b.date.localeCompare(a.date));
  const totalGal  = fuelEntries.reduce((s,e) => s+e.gallons, 0);
  const totalCost = fuelEntries.reduce((s,e) => s+e.total, 0);
  const avgCpg    = totalGal > 0 ? totalCost / totalGal : 0;

  document.getElementById("tab-fuel").innerHTML = `
    <div class="page-header">
      <div><h1>Fuel Log</h1><p>${fuelEntries.length} fill-ups recorded</p></div>
      <button class="btn btn-primary" id="add-fuel-btn">+ Add Fill-up</button>
    </div>
    <div class="chip-row">
      <div class="chip"><div class="c-val">${totalGal.toFixed(1)}</div><div class="c-lbl">Total Gallons</div></div>
      <div class="chip"><div class="c-val">${fmt$(totalCost)}</div><div class="c-lbl">Total Spend</div></div>
      <div class="chip"><div class="c-val">${fmt$(avgCpg)}</div><div class="c-lbl">Avg Cost / Gallon</div></div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Vehicle</th><th>Gallons</th><th>Cost/Gal</th><th>Total Cost</th><th>Odometer</th><th>Full Tank</th><th></th></tr></thead>
          <tbody>
            ${sorted.map(e => `<tr>
              <td class="text-muted">${e.date}</td><td>${vName(e.vehicleId)}</td>
              <td>${e.gallons.toFixed(3)}</td><td>${fmt$(e.cpg)}</td><td>${fmt$(e.total)}</td>
              <td>${fmtN(e.odometer)} mi</td><td>${e.full?"✅ Yes":"Partial"}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteFuel(${e.id})">Delete</button></td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById("add-fuel-btn").addEventListener("click", () => {
    const today = new Date().toISOString().slice(0,10);
    openModal(`
      <h2>Add Fuel Fill-up</h2>
      <form>
        <div class="form-group"><label>Vehicle</label><select name="vehicleId">${vehicleOptions()}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" name="date" value="${today}" required /></div>
          <div class="form-group"><label>Odometer (mi)</label><input type="number" name="odometer" placeholder="e.g. 34500" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Gallons</label><input type="number" id="f-gal" name="gallons" step="0.001" placeholder="e.g. 18.4" required /></div>
          <div class="form-group"><label>Cost per Gallon ($)</label><input type="number" id="f-cpg" name="cpg" step="0.001" placeholder="e.g. 3.79" required /></div>
        </div>
        <div class="form-group"><label>Total Cost ($)</label><input type="number" id="f-total" name="total" step="0.01" placeholder="Auto-calculated" /></div>
        <div class="form-group" style="display:flex;align-items:center;gap:0.5rem">
          <input type="checkbox" name="full" id="f-full" checked style="width:auto" />
          <label for="f-full" style="margin:0;font-weight:400">Full tank</label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    `, fd => {
      const gal = Number(fd.get("gallons")), cpg = Number(fd.get("cpg"));
      const total = Number(fd.get("total")) || +(gal*cpg).toFixed(2);
      fuelEntries.push({ id: nextId(fuelEntries), vehicleId: Number(fd.get("vehicleId")),
        date: fd.get("date"), gallons: gal, cpg, total,
        odometer: Number(fd.get("odometer")), full: !!fd.get("full") });
      renderFuel();
    });

    const calcTotal = () => {
      const g = parseFloat(document.getElementById("f-gal")?.value);
      const c = parseFloat(document.getElementById("f-cpg")?.value);
      if (!isNaN(g) && !isNaN(c)) document.getElementById("f-total").value = (g*c).toFixed(2);
    };
    setTimeout(() => {
      document.getElementById("f-gal")?.addEventListener("input", calcTotal);
      document.getElementById("f-cpg")?.addEventListener("input", calcTotal);
    }, 0);
  });
}

function deleteFuel(id) {
  if (!confirm("Delete this entry?")) return;
  const idx = fuelEntries.findIndex(e => e.id === id);
  if (idx !== -1) fuelEntries.splice(idx, 1);
  renderFuel();
}

// ═══════════════════════════════════════════
//  TAB: INSPECTIONS
// ═══════════════════════════════════════════

function renderInspections() {
  const sorted = [...inspections].sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById("tab-inspections").innerHTML = `
    <div class="page-header">
      <div><h1>Inspections</h1><p>${inspections.length} inspection reports</p></div>
      <button class="btn btn-primary" id="add-insp-btn">+ New Inspection</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Vehicle</th><th>Driver</th><th>Result</th><th>Failed Items</th><th>Notes</th><th></th></tr></thead>
          <tbody>
            ${sorted.map(e => {
              const failed = Object.entries(e.results).filter(([,v]) => v==="fail").map(([k]) => k);
              return `<tr>
                <td class="text-muted">${e.date}</td><td>${vName(e.vehicleId)}</td><td>${e.driver}</td>
                <td>${badge(e.pass?"pass":"fail")}</td>
                <td style="font-size:0.8rem;color:var(--danger)">${failed.length ? failed.join(", ") : '<span class="text-muted">—</span>'}</td>
                <td class="text-muted" style="font-size:0.82rem">${e.notes||"—"}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteInsp(${e.id})">Delete</button></td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById("add-insp-btn").addEventListener("click", () => {
    const today = new Date().toISOString().slice(0,10);
    openModal(`
      <h2>New Inspection</h2>
      <form>
        <div class="form-group"><label>Vehicle</label><select name="vehicleId">${vehicleOptions()}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" name="date" value="${today}" required /></div>
          <div class="form-group"><label>Driver Name</label><input type="text" name="driver" placeholder="Full name" required /></div>
        </div>
        <div class="form-group">
          <label style="margin-bottom:0.75rem">Checklist</label>
          ${CHECKLIST.map((item,i) => `
            <div class="checklist-item">
              <span class="item-name">${item}</span>
              <div class="radio-group">
                <label><input type="radio" name="chk_${i}" value="pass" checked /> Pass</label>
                <label><input type="radio" name="chk_${i}" value="fail" /> Fail</label>
              </div>
            </div>`).join("")}
        </div>
        <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Any observations…"></textarea></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Submit Inspection</button>
        </div>
      </form>
    `, fd => {
      const results = {};
      CHECKLIST.forEach((item,i) => { results[item] = fd.get(`chk_${i}`); });
      const pass = Object.values(results).every(v => v==="pass");
      inspections.push({ id: nextId(inspections), vehicleId: Number(fd.get("vehicleId")),
        date: fd.get("date"), driver: fd.get("driver"), results, pass, notes: fd.get("notes")||"" });
      renderInspections();
    });
  });
}

function deleteInsp(id) {
  if (!confirm("Delete this inspection?")) return;
  const idx = inspections.findIndex(e => e.id === id);
  if (idx !== -1) inspections.splice(idx, 1);
  renderInspections();
}


// ═══════════════════════════════════════════
//  TAB: DRIVERS
// ═══════════════════════════════════════════

function renderDrivers() {
  const totalCostLM  = driverCosts.filter(c => c.date>=LM_START && c.date<=LM_END).reduce((s,c) => s+c.amount, 0);
  const activeCount  = drivers.filter(d => d.status==="active").length;
  const sortedCosts  = [...driverCosts].sort((a,b) => b.date.localeCompare(a.date));
  const today        = new Date().toISOString().slice(0,10);
  const WARN_DAYS    = 90; // warn if expiry within 90 days

  function expiryClass(expiry) {
    const days = (new Date(expiry) - new Date(today)) / 86400000;
    return days < WARN_DAYS ? "expiry-warn" : "";
  }

  document.getElementById("tab-drivers").innerHTML = `
    <div class="page-header">
      <div><h1>Drivers</h1><p>${drivers.length} drivers — ${activeCount} active</p></div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-ghost" id="add-cost-btn">+ Log Cost</button>
        <button class="btn btn-primary" id="add-driver-btn">+ Add Driver</button>
      </div>
    </div>

    <div class="driver-grid">
      ${drivers.map(d => {
        const veh = vehicles.find(v => v.id === d.vehicleId);
        const marchCosts = driverCosts.filter(c => c.driverId===d.id && c.date>=LM_START && c.date<=LM_END).reduce((s,c)=>s+c.amount,0);
        const eCls = expiryClass(d.licenseExpiry);
        return `<div class="driver-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem">
            <div class="d-name">${d.name}</div>
            ${badge(d.status)}
          </div>
          <div class="d-info">
            <div>📋 ${d.license}</div>
            <div class="${eCls}">📅 Expires: ${d.licenseExpiry}${eCls ? " ⚠️" : ""}</div>
            <div>📞 ${d.phone}</div>
            <div>🚗 ${veh ? `${veh.year} ${veh.make} ${veh.model}` : "No primary vehicle"}</div>
            <div style="margin-top:0.5rem;font-weight:600;color:var(--text)">March cost: ${fmt$(marchCosts)}</div>
          </div>
          <button class="btn btn-danger btn-sm" style="margin-top:0.75rem;width:100%" onclick="deleteDriver(${d.id})">Remove</button>
        </div>`;
      }).join("")}
    </div>

    <div class="card section-gap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div>
          <div class="card-title" style="margin-bottom:0">Driver Costs
            <span class="card-subtitle">March 2026 total: ${fmt$(totalCostLM)}</span>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Driver</th><th>Vehicle</th><th>Type</th><th>Amount</th><th>Notes</th><th></th></tr></thead>
          <tbody>
            ${sortedCosts.length === 0 ? `<tr><td colspan="7" class="empty">No cost entries yet.</td></tr>` :
              sortedCosts.map(c => `<tr>
                <td class="text-muted">${c.date}</td>
                <td>${dName(c.driverId)}</td>
                <td>${c.vehicleId ? vName(c.vehicleId) : '<span class="text-muted">—</span>'}</td>
                <td>${badge(c.type)}</td>
                <td><strong>${fmt$(c.amount)}</strong></td>
                <td class="text-muted">${c.notes||"—"}</td>
                <td><button class="btn btn-danger btn-sm" onclick="deleteDriverCost(${c.id})">Delete</button></td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById("add-driver-btn").addEventListener("click", () => {
    openModal(`
      <h2>Add Driver</h2>
      <form>
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" name="name" required /></div>
          <div class="form-group"><label>Phone</label><input type="text" name="phone" placeholder="555-0100" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>License Number</label><input type="text" name="license" placeholder="CA-DL123456" required /></div>
          <div class="form-group"><label>License Expiry</label><input type="date" name="licenseExpiry" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Primary Vehicle (optional)</label><select name="vehicleId"><option value="">— None —</option>${vehicleOptions()}</select></div>
          <div class="form-group"><label>Status</label><select name="status"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Driver</button>
        </div>
      </form>
    `, fd => {
      const vId = fd.get("vehicleId") ? Number(fd.get("vehicleId")) : null;
      drivers.push({ id: nextId(drivers), name: fd.get("name"), license: fd.get("license"),
        licenseExpiry: fd.get("licenseExpiry"), phone: fd.get("phone")||"—",
        vehicleId: vId, status: fd.get("status") });
      renderDrivers();
    });
  });

  document.getElementById("add-cost-btn").addEventListener("click", () => {
    const today2 = new Date().toISOString().slice(0,10);
    openModal(`
      <h2>Log Driver Cost</h2>
      <form>
        <div class="form-row">
          <div class="form-group"><label>Driver</label>
            <select name="driverId">${drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join("")}</select>
          </div>
          <div class="form-group"><label>Vehicle (optional)</label><select name="vehicleId"><option value="">— None —</option>${vehicleOptions()}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" name="date" value="${today2}" required /></div>
          <div class="form-group"><label>Type</label><select name="type">${DRIVER_COST_TYPES.map(t=>`<option>${t}</option>`).join("")}</select></div>
        </div>
        <div class="form-group"><label>Amount ($)</label><input type="number" name="amount" step="0.01" required /></div>
        <div class="form-group"><label>Notes</label><input type="text" name="notes" placeholder="e.g. March salary" /></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Log Cost</button>
        </div>
      </form>
    `, fd => {
      const vId = fd.get("vehicleId") ? Number(fd.get("vehicleId")) : null;
      driverCosts.push({ id: nextId(driverCosts),
        driverId: Number(fd.get("driverId")), vehicleId: vId,
        date: fd.get("date"), type: fd.get("type"),
        amount: Number(fd.get("amount")), notes: fd.get("notes")||"" });
      renderDrivers();
    });
  });
}

function deleteDriver(id) {
  if (!confirm("Remove this driver?")) return;
  const idx = drivers.findIndex(d => d.id === id);
  if (idx !== -1) drivers.splice(idx, 1);
  renderDrivers();
}

function deleteDriverCost(id) {
  if (!confirm("Delete this cost entry?")) return;
  const idx = driverCosts.findIndex(c => c.id === id);
  if (idx !== -1) driverCosts.splice(idx, 1);
  renderDrivers();
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════

const RENDERERS = {
  dashboard:   renderDashboard,
  vehicles:    renderVehicles,
  jobs:        renderJobs,
  maintenance: renderMaintenance,
  fuel:        renderFuel,
  inspections: renderInspections,
  drivers:     renderDrivers,
};

function showTab(name) {
  document.querySelectorAll("#sidebar li").forEach(li =>
    li.classList.toggle("active", li.dataset.tab === name));
  document.querySelectorAll("#content section").forEach(s =>
    s.style.display = s.id === `tab-${name}` ? "block" : "none");
  RENDERERS[name]();
}

document.querySelectorAll("#sidebar li").forEach(li =>
  li.addEventListener("click", () => showTab(li.dataset.tab)));

// Boot
showTab("dashboard");
</script>
</body>
</html>
