version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: evabus
      POSTGRES_USER: evabus
      POSTGRES_PASSWORD: evabus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://evabus:evabus@db:5432/evabus
      FIREBASE_PROJECT_ID: your-firebase-project-id
      FIREBASE_CREDENTIALS_PATH: ""
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pgdata:
